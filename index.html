<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ML Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>ML Flashcards</h1>
  <span class="deck-label" id="deck-label">Google ML Glossary</span>
</header>

<!-- Category selector — buttons injected by app.js -->
<div class="category-selector" id="category-selector"></div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span class="progress-count" id="progress-count">1 / 1</span>
    <span class="progress-count" id="progress-pct">0%</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
  </div>
</div>

<div class="scene" id="scene" onclick="flipCard()">
  <div class="card" id="card">
    <div class="card-face card-front">
      <span class="card-face-label">Term</span>
      <div class="term" id="card-term"></div>
      <span class="category-tag" id="card-category"></span>
      <div class="tap-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M7 17L17 7M17 7H7M17 7v10"/>
        </svg>
        tap to flip
      </div>
    </div>
    <div class="card-face card-back">
      <span class="card-face-label">Definition</span>
      <div class="definition" id="card-definition"></div>
    </div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-prev" id="btn-prev" onclick="navigate(-1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M5 12l7-7M5 12l7 7"/></svg>
    Prev
  </button>

  <button class="btn btn-shuffle" id="btn-shuffle" onclick="shuffle()" title="Shuffle deck">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
  </button>

  <button class="btn btn-next" id="btn-next" onclick="navigate(1)">
    Next
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
  </button>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
