<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Flash Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #d8d6d0;
    --text-primary: #111111;
    --text-secondary: #666660;
    --accent: #3d5afe;
    --accent-light: #e8ecff;
    --tag-bg: #eeecea;
    --tag-text: #888880;
    --btn-hover: #f0efeb;
  }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    color: var(--text-primary);
  }

  header {
    width: 100%;
    max-width: 560px;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  header p {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .deck-grid {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .deck-card {
    display: block;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s ease, transform 0.1s ease;
  }

  .deck-card:hover {
    background: var(--btn-hover);
    transform: translateY(-1px);
  }

  .deck-card .deck-name {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .deck-card .deck-meta {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .deck-card .deck-tag {
    display: inline-block;
    margin-top: 10px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 2px 8px;
    border-radius: 4px;
  }
</style>
</head>
<body>

<header>
  <h1>Flash Cards</h1>
  <p>Pick a deck to study.</p>
</header>

<div class="deck-grid">

  <a class="deck-card" href="ml-flashcards.html">
    <div class="deck-name">ML Fundamentals</div>
    <div class="deck-meta">Core machine learning concepts and terminology</div>
    <span class="deck-tag">ml fundamentals</span>
  </a>

  <!-- Add new decks here -->

</div>

</body>
</html>
